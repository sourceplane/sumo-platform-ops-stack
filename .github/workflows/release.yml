name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  publish-package:
    name: Publish package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize orun workspace
        uses: sourceplane/kiox-action@v2.1.2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive release version
        shell: bash
        run: |
          stack_version="$(awk '/^  version: /{print $2}' stack.yaml)"
          tag_version="${GITHUB_REF_NAME#v}"
          test -n "${stack_version}"
          test "${stack_version}" = "${tag_version}"
          echo "STACK_VERSION=${stack_version}" >> "${GITHUB_ENV}"

      - name: Publish OCI package
        run: |
          kiox -- orun publish ghcr.io/sourceplane/sumo-platform-ops-stack:${STACK_VERSION} \
            --root . \
            --version "${STACK_VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists."
            exit 0
          fi

          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
