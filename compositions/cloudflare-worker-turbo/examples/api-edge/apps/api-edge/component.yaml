apiVersion: sourceplane.io/v1
kind: Component

metadata:
  name: api-edge-worker

spec:
  type: cloudflare-worker-turbo
  domain: platform-runtime
  subscribe:
    environments:
      - dev
      - staging
      - production
  inputs:
    nodeVersion: "20"
    pnpmVersion: "10.12.1"
    productionBranch: main
    # Optional: specify wrangler config file explicitly
    # wranglerConfig: wrangler.jsonc
    # Optional: run D1 migrations before deploy
    # migrationCommand: "pnpm exec wrangler d1 migrations apply my-db --remote"
    # Optional: provision resources before deploy
    # preDeployCommand: "./scripts/bootstrap-cloudflare.sh"
    # Optional: verify live endpoint after deploy
    # smokeCommand: "curl -sf https://my-api.workers.dev/health"
  labels:
    team: platform
    layer: runtime
    surface: api
    runtime: cloudflare
