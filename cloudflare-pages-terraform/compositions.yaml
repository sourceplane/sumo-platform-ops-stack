apiVersion: sourceplane.io/v1alpha1
kind: Composition
metadata:
  name: cloudflare-pages-terraform
spec:
  type: cloudflare-pages-terraform
  description: Verify static site builds locally and reconcile a Git-backed Cloudflare Pages project with Terraform
  defaultJob: verify-reconcile-cloudflare-pages-terraform
  inputSchema:
    $schema: http://json-schema.org/draft-07/schema#
    title: Cloudflare Pages Terraform Component
    description: Schema for Cloudflare Pages projects managed through Terraform-backed Git integration
    type: object
    required:
      - name
      - type
      - inputs
    properties:
      name:
        type: string
        description: Component name
      type:
        type: string
        const: cloudflare-pages-terraform
        description: Component type identifier
      inputs:
        type: object
        required:
          - siteDir
          - installCommand
          - buildCommand
          - cloudflareBuildCommand
          - outputDir
          - rootDir
          - nodeVersion
          - terraformDir
          - terraformVersion
          - projectName
          - productionBranch
          - repoOwner
          - repoName
        properties:
          siteDir:
            type: string
            description: Path to the static site root relative to the component directory
          installCommand:
            type: string
            description: Command used to install site dependencies before the local build
          buildCommand:
            type: string
            description: Command used to produce the static site output locally
          cloudflareBuildCommand:
            type: string
            description: Command Cloudflare Pages runs when building the Git-backed project
          outputDir:
            type: string
            description: Directory produced by the static site build relative to siteDir
          rootDir:
            type: string
            description: Repository-root relative directory Cloudflare Pages should build from
          nodeVersion:
            type: string
            description: Node.js version provisioned for the local site build
          terraformDir:
            type: string
            description: Terraform root directory used to reconcile the Pages project
          terraformVersion:
            type: string
            description: Terraform version provisioned for the reconciliation job
          projectName:
            type: string
            description: Cloudflare Pages project name managed by Terraform
          productionBranch:
            type: string
            description: Branch used for production deploys in both GitHub and Cloudflare Pages
          repoOwner:
            type: string
            description: GitHub owner connected to the Cloudflare Pages project
          repoName:
            type: string
            description: GitHub repository name connected to the Cloudflare Pages project
        additionalProperties: false
    additionalProperties: true
  jobs:
    - name: verify-reconcile-cloudflare-pages-terraform
      description: Build static assets locally, validate Terraform, plan on branches, and apply on the production branch
      runsOn: ubuntu-22.04
      timeout: 30m
      retries: 0
      labels:
        scope: infra
      steps:
        - id: setup-node
          name: setup-node
          use: actions/setup-node@v4
          with:
            node-version: "{{.nodeVersion}}"
        - name: install-site-dependencies
          shell: bash
          run: |
            cd "{{.siteDir}}"
            {{.installCommand}}
          onFailure: stop
        - name: build-site
          shell: bash
          run: |
            cd "{{.siteDir}}"
            {{.buildCommand}}
          onFailure: stop
        - name: verify-build-output
          shell: bash
          run: |
            cd "{{.siteDir}}"
            test -d "{{.outputDir}}"
            find "{{.outputDir}}" -maxdepth 2 -type f | head -n 20
          onFailure: stop
        - id: setup-terraform
          name: setup-terraform
          use: hashicorp/setup-terraform@v4
          with:
            terraform_version: "{{.terraformVersion}}"
            terraform_wrapper: "false"
        - name: terraform-context
          shell: bash
          run: |
            terraform version
            echo "Reconciling Cloudflare Pages project {{.projectName}} from {{.terraformDir}}"
          onFailure: stop
        - name: terraform-fmt-check
          run: terraform -chdir={{.terraformDir}} fmt -check
          onFailure: stop
        - name: terraform-init
          run: terraform -chdir={{.terraformDir}} init -input=false
          onFailure: stop
        - name: terraform-validate
          run: terraform -chdir={{.terraformDir}} validate -no-color
          onFailure: stop
        - name: terraform-plan-or-apply
          shell: bash
          run: |
            cloudflare_account_id="${CLOUDFLARE_ACCOUNT_ID:-00000000000000000000000000000000}"

            terraform_args=(
              "-input=false"
              "-var=account_id=${cloudflare_account_id}"
              "-var=project_name={{.projectName}}"
              "-var=production_branch={{.productionBranch}}"
              "-var=repo_owner={{.repoOwner}}"
              "-var=repo_name={{.repoName}}"
              "-var=build_command={{.cloudflareBuildCommand}}"
              "-var=destination_dir={{.outputDir}}"
              "-var=root_dir={{.rootDir}}"
            )

            if [ "{{.Environment}}" = "production" ] && [ "${GITHUB_REF:-}" = "refs/heads/{{.productionBranch}}" ]; then
              : "${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID is required for apply}"
              : "${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN is required for apply}"
              terraform -chdir={{.terraformDir}} apply -auto-approve "${terraform_args[@]}"
              exit 0
            fi

            if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
              echo "Skipping terraform plan because Cloudflare credentials are not available outside deployment contexts."
              exit 0
            fi

            terraform -chdir={{.terraformDir}} plan -lock=false -no-color "${terraform_args[@]}"
          onFailure: stop