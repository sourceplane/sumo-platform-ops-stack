apiVersion: catalog.orun.dev/v1alpha1
kind: Blueprint
metadata:
  name: nextjs-cloudflare
spec:
  summary: Next.js monorepo delivery on Cloudflare with Terraform-managed Pages resources.
  uses:
    - workspace
    - turbo-package
    - cloudflare-pages-turbo
    - cloudflare-pages-terraform
  outcomes:
    - Shared workspace validation
    - Monorepo package verification
    - Git-backed Pages provisioning
    - Edge-hosted frontend delivery
