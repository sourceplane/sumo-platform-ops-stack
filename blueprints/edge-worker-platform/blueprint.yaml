apiVersion: catalog.orun.dev/v1alpha1
kind: Blueprint
metadata:
  name: edge-worker-platform
spec:
  summary: Edge-worker delivery with workspace verification, Terraform foundations, and deploy overlays.
  uses:
    - workspace
    - terraform
    - cloudflare-worker
    - helm-values
  outcomes:
    - Worker validation and deployment
    - Infra validation
    - Environment configuration overlays
