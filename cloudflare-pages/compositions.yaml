apiVersion: sourceplane.io/v1alpha1
kind: Composition
metadata:
  name: cloudflare-pages
spec:
  type: cloudflare-pages
  description: Build static site assets and direct-upload them to Cloudflare Pages with Wrangler
  defaultJob: verify-deploy-cloudflare-pages
  inputSchema:
    $schema: http://json-schema.org/draft-07/schema#
    title: Cloudflare Pages Direct Upload Component
    description: Schema for static site deployments that build locally and publish with Wrangler
    type: object
    required:
      - name
      - type
      - inputs
    properties:
      name:
        type: string
        description: Component name
      type:
        type: string
        const: cloudflare-pages
        description: Component type identifier
      inputs:
        type: object
        required:
          - siteDir
          - installCommand
          - buildCommand
          - outputDir
          - projectName
          - nodeVersion
          - productionBranch
        properties:
          siteDir:
            type: string
            description: Path to the static site root relative to the component directory
          installCommand:
            type: string
            description: Command used to install site dependencies before the build
          buildCommand:
            type: string
            description: Command used to generate the static site output
          outputDir:
            type: string
            description: Directory produced by the static site build relative to siteDir
          projectName:
            type: string
            description: Cloudflare Pages project name used for direct upload
          nodeVersion:
            type: string
            description: Node.js version provisioned for the site build
          productionBranch:
            type: string
            description: Branch that is allowed to perform Cloudflare deployments
        additionalProperties: false
    additionalProperties: true
  jobs:
    - name: verify-deploy-cloudflare-pages
      description: Build static assets everywhere and deploy them to Cloudflare Pages from the production branch
      runsOn: ubuntu-22.04
      timeout: 25m
      retries: 0
      labels:
        scope: delivery
      steps:
        - id: setup-node
          name: setup-node
          use: actions/setup-node@v4
          with:
            node-version: "{{.nodeVersion}}"
        - name: install-site-dependencies
          shell: bash
          run: |
            cd "{{.siteDir}}"
            {{.installCommand}}
          onFailure: stop
        - name: build-site
          shell: bash
          run: |
            cd "{{.siteDir}}"
            {{.buildCommand}}
          onFailure: stop
        - name: verify-build-output
          shell: bash
          run: |
            cd "{{.siteDir}}"
            test -d "{{.outputDir}}"
            find "{{.outputDir}}" -maxdepth 2 -type f | head -n 20
          onFailure: stop
        - name: ensure-pages-project
          shell: bash
          run: |
            if [ "{{.Environment}}" != "production" ] || [ "${GITHUB_REF:-}" != "refs/heads/{{.productionBranch}}" ]; then
              echo "Skipping Cloudflare Pages project reconciliation for {{.Environment}} on ${GITHUB_REF:-local}."
              exit 0
            fi

            : "${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID is required for deployment}"
            : "${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN is required for deployment}"

            api_root="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
            response_file="${RUNNER_TEMP:-/tmp}/cloudflare-pages-project.json"
            status="$(curl -sS -o "${response_file}" -w "%{http_code}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${api_root}/{{.projectName}}")"

            if [ "${status}" = "200" ]; then
              echo "Pages project {{.projectName}} already exists."
            elif [ "${status}" = "404" ]; then
              curl -sS --fail -X POST \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data '{"name":"{{.projectName}}","production_branch":"{{.productionBranch}}"}' \
                "${api_root}" >/dev/null
              echo "Created Pages project {{.projectName}}."
            else
              cat "${response_file}"
              exit 1
            fi

            curl -sS --fail -X PATCH \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"production_branch":"{{.productionBranch}}"}' \
              "${api_root}/{{.projectName}}" >/dev/null
          onFailure: stop
        - name: deploy-pages-artifact
          shell: bash
          run: |
            if [ "{{.Environment}}" != "production" ] || [ "${GITHUB_REF:-}" != "refs/heads/{{.productionBranch}}" ]; then
              echo "Skipping Cloudflare Pages deploy for {{.Environment}} on ${GITHUB_REF:-local}."
              exit 0
            fi

            : "${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID is required for deployment}"
            : "${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN is required for deployment}"

            cd "{{.siteDir}}"
            npx wrangler pages deploy "{{.outputDir}}" \
              --project-name "{{.projectName}}" \
              --branch "{{.productionBranch}}"
          onFailure: stop